name: Build Smart Clinic APK

# متى يتم تشغيل هذا البناء؟
on:
  push:
    branches: [ "main", "master" ] # عند رفع كود جديد
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest # سيرفرات لينكس سريعة من جيت هب

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # إصدار بايثون مستقر

      - name: 📦 Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Build APK with Flet
        # هنا تضع اسم تطبيقك، الحزمة، والأيقونة
        run: >
          flet build apk 
          --project-name smart_clinic 
          --product "Smart Clinic" 
          --org "com.yourname.smartclinic" 
          --description "نظام العيادة الذكي المتكامل" 
          --icon "assets/icon.png"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Clinic-App
          path: build/apk/**/*.apk
